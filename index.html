<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPM Press Club - Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Cairo', sans-serif;
  background:linear-gradient(135deg,#0b1f3a,#132f57);
  color:white;
}
.container {
  max-width:700px;
  margin:auto;
  padding:30px 20px;
}
h1 {
  text-align:center;
  margin-bottom:10px;
}
p {
  text-align:center;
  color:#d4af37;
  margin-bottom:30px;
}
form {
  background:white;
  color:#0b1f3a;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
label {
  display:block;
  margin-top:15px;
  font-weight:bold;
}
input, select, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}
button {
  margin-top:20px;
  width:100%;
  background:#d4af37;
  border:none;
  padding:15px;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>
<body><div class="container">
  <h1>LPM PRESS CLUB</h1>
  <p>استمارة الانضمام</p>  <form action="https://formspree.io/f/xjgjjoyg" method="POST">
    <label>الاسم الكامل</label>
    <input type="text" required><label>القسم / المستوى</label>
<select>
  <option>1ère</option>
  <option>2ème</option>
  <option>3ème</option>
  <option>4ème</option>
</select>

<label>البريد الإلكتروني</label>
<input type="email" required>

<label>رقم الهاتف</label>
<input type="tel">

<label>لماذا تريد الانضمام؟</label>
<textarea rows="3"></textarea>

<label>اهتماماتك</label>
<select>
  <option>Writing</option>
  <option>Photography</option>
  <option>Design</option>
  <option>Video Editing</option>
</select>

<label>ارفع أعمالك (اختياري)</label>
<input type="file" multiple>

<button type="submit">إرسال</button>
<input type="hidden" name="_subject" value="New LPM Press Club Registration">
<input type="hidden" name="_captcha" value="false">

  </form>
</div></body>
</html>
