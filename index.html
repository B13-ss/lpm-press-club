<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Wizard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <form id="multiStepForm">
            <div class="form-step active">
                <label for="name">Name:</label>
                <input type="text" id="name" required aria-label="Name">
                <span class="error-message" aria-live="polite"></span>
                <button type="button" class="next">Next</button>
            </div>
            <div class="form-step">
                <label for="email">Email:</label>
                <input type="email" id="email" required aria-label="Email">
                <span class="error-message" aria-live="polite"></span>
                <button type="button" class="next">Next</button>
                <button type="button" class="prev">Back</button>
            </div>
            <div class="form-step">
                <label for="fileUpload">Upload File:</label>
                <input type="file" id="fileUpload" aria-label="File Upload">
                <div class="file-preview" aria-live="polite"></div>
                <button type="button" class="next">Finish</button>
                <button type="button" class="prev">Back</button>
            </div>
            <div class="progress-indicator">
                <div class="progress-bar"></div>
            </div>
        </form>
    </div>
</body>
</html>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const formSteps = document.querySelectorAll('.form-step');
    const progressBar = document.querySelector('.progress-bar');
    let currentStep = 0;

    function updateProgress() {
        progressBar.style.width = ((currentStep + 1) / formSteps.length) * 100 + '%';
    }

    function showStep(step) {
        formSteps.forEach((formStep, index) => {
            formStep.classList.toggle('active', index === step);
        });
        updateProgress();
    }

    document.querySelectorAll('.next').forEach(button => {
        button.addEventListener('click', function() {
            const input = formSteps[currentStep].querySelector('input');
            const errorMessage = formSteps[currentStep].querySelector('.error-message');
            if (input.checkValidity()) {
                currentStep++;
                showStep(currentStep);
                errorMessage.textContent = '';
            } else {
                errorMessage.textContent = 'Please provide a valid value.';
            }
        });
    });

    document.querySelectorAll('.prev').forEach(button => {
        button.addEventListener('click', function() {
            currentStep--;
            showStep(currentStep);
        });
    });

    // Auto-save feature and performance optimizations can be added here.
});
</script>
